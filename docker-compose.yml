version: "3.8"

services:
  db:
    image: postgres:15
    container_name: postgen_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aipostgen
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: postgen_redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: postgen_backend
    volumes:
      - ./backend:/app
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: uvicorn main:app --host 0.0.0.0 --port 5000 --reload

  worker:
    build:
      context: ./backend
    container_name: postgen_worker
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: celery -A worker.celery_app.celery worker --loglevel=info

  frontend:
    build:
      context: ./frontend
    container_name: postgen_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    command: npm run dev

volumes:
  postgres_data:
